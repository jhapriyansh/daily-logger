name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for arm64
        run: GOOS=linux GOARCH=arm64 go build -o daily-logger .

      - name: Deploy to Pi
        run: |
          rsync -avz --delete \
            daily-logger templates static  \
            pi@10.85.150.248:/opt/daily-logger/
          ssh pi@10.85.150.248 'sudo systemctl restart daily-logger'
