name: Build and Push to RPi

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build binary
        run: |
          cd ~/projects/daily-logger
          git pull
          GOOS=linux GOARCH=arm64 go build -o daily-logger .
      - name: Deploy to Pi
        run: |
          scp -o ConnectTimeout=10 -r ~/projects/daily-logger pi@10.85.150.248:/opt/daily-logger-new
          ssh -o ConnectTimeout=10 pi@10.85.150.248 "rm -rf /opt/daily-logger && mv /opt/daily-logger-new /opt/daily-logger"