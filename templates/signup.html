<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Sign Up | Daily Logger</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="page page-auth">
    <main class="auth-panel" aria-labelledby="signup-title">
      <p class="eyebrow">Daily Logger</p>
      <h1 id="signup-title">Sign Up</h1>
      <form class="stack" method="POST" action="/signup">
        <label>
          <span>Username</span>
          <input
            name="username"
            autocomplete="username"
            placeholder="username"
            required
          />
        </label>
        <label>
          <span>Password</span>
          <input
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="password"
            required
          />
        </label>
        <button type="submit">Create Account</button>
      </form>
      <p class="auth-link"><a href="/login">Already have an account?</a></p>
    </main>
  </body>
</html>
